{% extends 'base.html' %}
{% block title %} Criar usuário {% endblock %}

<!-- Conteúdo da página -->
{% block content %}
<div class="flex flex-col items-center">
    <div class="w-full max-w-sm bg-stone-900 rounded-b-md p-2">
        <!-- Link para voltar -->
        <a href="{% url 'control' %}"
            class="bg-yellow-600 hover:bg-yellow-400 font-semibold transition p-1 rounded-md font-semibold">
            Voltar
        </a>

        <form method="POST">
            {% csrf_token %}
            <div class="flex flex-col items-center gap-2">
                <h1>Nova mensagem</h1>

                <P>De: {{ request.user }}</P>

                <div class="flex">
                    <p>Para: </p>
                    {{ form.sent_to }}
                </div>

                <div class="w-full flex flex-row items-center justify-center gap-2">
                    {{ form.msg_text }}
                </div>

                <button type="submit"
                    class="bg-green-800 hover:bg-green-600 font-semibold px-4 py-2 rounded-md shadow-md transition text-white cursor-pointer">
                    Enviar
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
