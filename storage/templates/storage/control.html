{% extends 'base.html' %}
{% block title %} EasySharing - Home {% endblock %}
{% block content %}
<div class="w-full h-full grid grid-cols-12 gap-2">
    <!-- Painel de configurações gerais -->
    <div class="col-span-12 md:col-span-3 bg-stone-900 rounded-b-md p-2">
        <h2 class="text-center font-medium mb-2">
            Painel Geral
        </h2>

        <ul class="space-y-2 text-sm text-center text-white">
            <li id="toggle_btn" data-page="users"
                class="menu-item p-2 rounded-md shadow-md bg-blue-800 transition cursor-pointer">
                Usuários
            </li>
            <li id="toggle_btn" data-page="folders"
                class="menu-item p-2 rounded-md shadow-md bg-stone-800 transition cursor-pointer">
                Pastas
            </li>
            <li id="toggle_btn" data-page="teams"
                class="menu-item p-2 rounded-md shadow-md bg-stone-800 transition cursor-pointer">
                Equipes
            </li>
            <li id="toggle_btn" data-page="about"
                class="menu-item p-2 rounded-md shadow-md bg-stone-800 transition cursor-pointer">
                Sobre
            </li>
        </ul>
    </div>

    <!-- Área de configurações -->
    <div class="col-span-12 md:col-span-9 space-y-2">
        <!-- Card de configuração -->
        <div class="bg-stone-900 rounded-b-md p-2">
            <p class="text-center mb-2">
                Configurações
            </p>

            <!-- Usuários -->
            <div id="users" class="menu-content block bg-stone-900 rounded-md shadow-md">
                Usuarios
            </div>

            <!-- Pastas -->
            <div id="folders" class="menu-content hidden bg-stone-900 rounded-md shadow-md">
                Pastas
            </div>

            <!-- Equipes -->
            <div id="teams" class="menu-content hidden bg-stone-900 rounded-md shadow-md">
                Equipes
            </div>

            <!-- Sobre -->
            <div id="about" class="menu-content hidden bg-stone-900 rounded-md shadow-md">
                Sobre
            </div>

        </div>
    </div>
</div>
<script>
  const menuItems = document.querySelectorAll(".menu-item");
  const contents = document.querySelectorAll(".menu-content");

  menuItems.forEach(item => {
    item.addEventListener("click", () => {

      const page = item.dataset.page;

      // 1️⃣ Esconde todos os conteúdos
      contents.forEach(content => {
        content.classList.add("hidden");
      });

      // 2️⃣ Mostra o conteúdo correspondente
      const activeContent = document.getElementById(page);
      if (activeContent) {
        activeContent.classList.remove("hidden");
      }

      // 3️⃣ Remove destaque de todos os botões
      menuItems.forEach(btn => {
        btn.classList.remove("bg-blue-800", "hover:bg-blue-600");
        btn.classList.add("bg-stone-800", "hover:bg-stone-600");
      });

      // 4️⃣ Destaca o botão clicado
      item.classList.remove("bg-stone-800", "hover:bg-stone-600");
      item.classList.add("bg-blue-800", "hover:bg-blue-600");
    });
  });
</script>

{% endblock %}
