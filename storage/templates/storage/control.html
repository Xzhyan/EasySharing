{% extends 'base.html' %}
{% block title %} EasySharing - Home {% endblock %}

<div class="w-full h-full grid grid-cols-12 gap-2">
    <!-- Painel de configurações gerais -->
    <div class="col-span-12 md:col-span-3 bg-stone-800 rounded-b-md p-2">
        <h2 class="text-center font-medium mb-2">
            Painel Geral
        </h2>

        <ul class="space-y-2 text-sm text-center">
            <li class="p-2 rounded-md shadow-md bg-stone-900 hover:bg-stone-700 transition cursor-pointer">
                Usuários
            </li>
            <li class="p-2 rounded-md shadow-md bg-stone-900 hover:bg-stone-700 transition cursor-pointer">
                Pastas
            </li>
            <li class="p-2 rounded-md shadow-md bg-stone-900 hover:bg-stone-700 transition cursor-pointer">

            </li>
            <li class="p-2 rounded-md shadow-md bg-stone-900 hover:bg-stone-700 transition cursor-pointer">
                Sobre
            </li>
        </ul>
    </div>

    <!-- Área de configurações -->
    <div class="col-span-12 md:col-span-9 space-y-2">
        <!-- Card de configuração -->
        <div class="bg-stone-800 rounded-b-md p-2">
            <p class="text-center mb-2">
                Configurações

            <div class="bg-stone-900 rounded-md shadow-md">

            </div>
        </div>
