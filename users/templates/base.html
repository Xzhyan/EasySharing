{% load static %}
<!DOCTYPE html>
<html lang="en_US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Tailwindcss CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen flex flex-col bg-neutral-900 text-gray-400">
    <!-- Pop-up de alertas do site -->
    {% if messages %}
        <div class="fixed top-5 right-5 space-y-2 z-50">
            {% for msg in messages %}
                <div class="msg-pop-up w-[300px] text-center px-4 py-2 rounded-md shadow-md transition-opacity duration-500
                    {% if msg.tags == 'success' %}bg-green-700 text-white
                    {% elif msg.tags == 'error' %}bg-red-700 text-white
                    {% elif msg.tags == 'warning' %}bg-yellow-700 text-black
                    {% elif msg.tags == 'info' %}bg-blue-700 text-white
                    {% else %}bg-gray-500 text-white
                    {% endif %}"
                >
                    {{ msg }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- Header do sistema -->
    <div class="bg-stone-950 border-b-4 border-stone-900">
        <div class="flex items-center h-[44px] px-4">

            <!-- Titutlo e logo do sistema -->
            <div class="flex-1">
                <h1><b>EasySharing</b> - Internal Sharing and Storage - v2</h1>
            </div>

            <!-- Navegação -->
            <div class="flex gap-4">
                <!-- Apenas exibe se o usuário for autenticado -->
                {% if user.is_authenticated %}
                    <!-- Principal -->
                    <a href="{% url 'main' %}" class="bg-green-800 hover:bg-green-600 text-white p-2 rounded-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7" />
                            <path d="M9 22V12h6v10" />
                        </svg>
                    </a>

                    <!-- Configurações -->
                    <a href="{% url 'control' %}" class="bg-blue-800 hover:bg-blue-600 text-white p-2 rounded-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10.91 3.09V3a2 2 0 0 1 4 0v.09c0 .7.4 1.34 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01c.17.6.81 1 1.51 1H21a2 2 0 0 1 0 4h-.09c-.7 0-1.34.4-1.51 1z" />
                        </svg>
                    </a>

                    <!-- Logout -->
                    <a href="{% url 'user-logout' %}" class="bg-red-800 hover:bg-red-600 text-white p-2 rounded-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                    </a>
                {% endif %}
            </div>
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- JavaScript -->
    <script>
        // PopUp de Mensagens
        function hideMsgPopUp() {
            const messages = document.querySelectorAll(".msg-pop-up");

            messages.forEach((msg) => {
                setTimeout(() => {
                    msg.style.opacity = "0";

                    setTimeout(() => {
                        msg.remove();
                    }, 500);
                }, 3000);
            });
        }
        document.addEventListener("DOMContentLoaded", hideMsgPopUp)

        // Selecionar todos, desmarcar todos
        function selectAllCheckBox() {
            const selectAll = document.getElementById("select-all");

            selectAll.addEventListener("change", () => {
                const visibleRows = document.querySelectorAll('tbody tr:not([style*="display: none"])');

                visibleRows.forEach(row => {
                    const checkbox = row.querySelector('input[name="selected"]');
                    if (checkbox) checkbox.checked = selectAll.checked;
                });
                selectedItemsCount();
            });

            // Se houver uma nova pesquisa na barra reseta.
            const searchInput = document.getElementById("search-files");

            if (searchInput) {
                searchInput.addEventListener("input", () => {
                    selectAll.checked = false;
                });
            }
        }
        document.addEventListener("DOMContentLoaded", selectAllCheckBox);

        // Pesquisar
        function enableSearch(inputId, targetSelector) {
            const searchInput = document.getElementById(inputId);

            if (!searchInput) return;

            searchInput.addEventListener("input", function () {
                const term = this.value.toLowerCase();
                const lines = document.querySelectorAll(targetSelector);

                lines.forEach((line) => {
                    const text = line.textContent.toLowerCase();
                    line.style.display = text.includes(term) ? "" : "none";
                });
            });
        }
        document.addEventListener("DOMContentLoaded", function () {
            enableSearch("search-files", "tbody tr");
        });

        // Contador de arquios para upload
        function uploadFilesCount() {
            const countSpan = document.getElementById("upload_count")
            const filesInput = document.getElementById("upload_input")

            filesInput.addEventListener("change", function () {
                const totalFiles = filesInput.files.length

                countSpan.textContent = `${totalFiles} arquivos selecionados.`
            });
        }
        document.addEventListener("DOMContentLoaded", uploadFilesCount);

        // Contador de arquivos selecionados
        function selectedItemsCount() {
            const checkboxes = document.querySelectorAll(".checkbox");
            const selectedItems = [];

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selectedItems.push(cb.value);
                }
            });

            const countSpan = document.getElementById("selected-items");
            countSpan.textContent = selectedItems.length;
        }
        document.querySelectorAll('.checkbox').forEach(cb => {
            cb.addEventListener('change', selectedItemsCount);
        });
    </script>
</body>
</html>
