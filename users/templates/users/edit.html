{% extends 'base.html' %}
{% block title %} Editar usuário {% endblock %}

<!-- Conteúdo da página -->
{% block content %}
<div class="flex flex-col items-center justify-center">
    <div class="w-full max-w-sm bg-stone-900 rounded-b-md p-2">
        <!-- Link para voltar -->
        <a href="{% url 'control' %}"
            class="bg-yellow-600 hover:bg-yellow-400 font-semibold transition p-1 rounded-md font-semibold">
            Voltar
        </a>

        <!-- Form de edição -->
        <form method="POST">
            {% csrf_token %}
            <div class="flex flex-col justify-center items-center gap-2">
                <h1 class="font-semibold text-center">
                    {{ user.username }}
                </h1>

                <!-- Input de nome de usuário -->
                {{ form.username }}

                <!-- Select de cargos -->
                {{ form.role }}

                <!-- Checkbox de Ativo/Inativo -->
                <div class="flex flex-row gap-2">
                    <p>Ativo</p> {{ form.is_active }}
                </div>

                <!-- Checkbox de usuário Admin -->
                <div class="flex flex-row gap-2">
                    <p>Admin</p> {{ form.is_admin }}
                </div>

                <button type="submit"
                    class="bg-red-800 hover:bg-red-600 font-semibold px-4 py-2 rounded-md shadow-md transition text-white cursor-pointer">
                    Salvar
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
